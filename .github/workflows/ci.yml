name: Lint & Code Style CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Linting & Testing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 pytest
          # Install requirements if requirements.txt exists
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Black formatter check
        run: black --check .

      - name: Run Isort import ordering check
        run: isort --check --profile black .

      - name: Run Flake8 linter check
        run: flake8 . --max-line-length=120 --exclude=.git,__pycache__,build,dist,claude-code-best-practice

      - name: Run Pytest
        run: |
          # Only run pytest if the tests directory exists
          if [ -d tests ]; then
            pytest tests/
          else
            echo "No tests/ directory found. Skipping tests."
          fi
